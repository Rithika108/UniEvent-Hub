<!DOCTYPE html>
<html>
<head>
<title>UniEvent Hub - Login & Signup</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-container {
  width: 100%;
  max-width: 450px;
  background: white;
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  overflow: hidden;
}

.auth-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 30px;
  text-align: center;
}

.auth-header h1 {
  font-size: 28px;
  margin-bottom: 5px;
}

.auth-header p {
  font-size: 14px;
  opacity: 0.9;
}

.toggle-buttons {
  display: flex;
  gap: 0;
}

.toggle-btn {
  flex: 1;
  padding: 12px;
  border: none;
  background: white;
  color: #667eea;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
}

.toggle-btn.active {
  background: #667eea;
  color: white;
}

.form-container {
  padding: 40px;
}

.form-group {
  margin-bottom: 18px;
}

label {
  display: block;
  font-size: 12px;
  font-weight: bold;
  color: #333;
  margin-bottom: 6px;
  text-transform: uppercase;
}

input, select {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  transition: border-color 0.3s;
}

input:focus, select:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.role-group {
  display: flex;
  gap: 15px;
  margin-bottom: 18px;
}

.role-option {
  flex: 1;
}

.role-option input[type="radio"] {
  display: none;
}

.role-option label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0;
  padding: 10px;
  border: 2px solid #ddd;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
}

.role-option input[type="radio"]:checked + label {
  border-color: #667eea;
  background: rgba(102, 126, 234, 0.1);
}

.role-option input[type="radio"]:checked + label::before {
  content: '✓';
  color: #667eea;
  font-weight: bold;
}

.password-group {
  display: flex;
  gap: 12px;
}

.password-group input {
  flex: 1;
}

.error {
  color: #e74c3c;
  font-size: 12px;
  margin-top: 5px;
  display: none;
}

.error.show {
  display: block;
}

button.submit-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 10px;
}

button.submit-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
}

button.submit-btn:active {
  transform: translateY(0);
}

.social-login {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.social-btn {
  width: 100%;
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  background: white;
  color: #333;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
}

.social-btn.google {
  border-color: #db4437;
  color: #db4437;
}

.social-btn.github {
  border-color: #333;
  color: #333;
}

.social-btn:hover {
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

#error, .error {
  word-break: break-word;
}

#globalError {
  display: none;
  background: #fdecea;
  color: #b00020;
  padding: 12px 15px;
  border-radius: 10px;
  margin-bottom: 18px;
  font-size: 13px;
}

#globalError.show {
  display: block;
}

.hidden {
  display: none;
}

.success-message {
  display: none;
  background: #d4edda;
  color: #155724;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 15px;
  text-align: center;
  font-size: 14px;
}

.success-message.show {
  display: block;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.form-row .form-group {
  margin-bottom: 0;
}

.spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top: 2px solid white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 8px;
}

.submit-btn.loading {
  opacity: 0.7;
  pointer-events: none;
}

.submit-btn.loading .spinner {
  display: inline-block;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="auth-container">
  <div class="auth-header">
    <h1>🎓 UniEvent Hub</h1>
    <p>Connect · Plan · Collaborate</p>
  </div>

  <div class="toggle-buttons">
    <button class="toggle-btn active" onclick="switchToLogin()">Login</button>
    <button class="toggle-btn" onclick="switchToSignup()">Sign Up</button>
  </div>

  <div class="form-container">
    <!-- SUCCESS MESSAGE -->
    <div class="success-message" id="successMessage"></div>
    <div class="error" id="globalError"></div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="role-group">
        <div class="role-option">
          <input type="radio" id="loginStudent" name="loginRole" value="student" checked>
          <label for="loginStudent">Student</label>
        </div>
        <div class="role-option">
          <input type="radio" id="loginFaculty" name="loginRole" value="faculty">
          <label for="loginFaculty">Faculty</label>
        </div>
      </div>

      <div class="social-login">
        <button type="button" class="social-btn google" title="Coming soon" onclick="handleSocialLogin('google')">Continue with Google (coming soon)</button>
        <button type="button" class="social-btn github" title="Coming soon" onclick="handleSocialLogin('github')">Continue with GitHub (coming soon)</button>
      </div>

      <div class="error" id="loginGeneralError"></div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="loginEmail" placeholder="your@email.com">
        <div class="error" id="loginEmailError"></div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password">
        <div class="error" id="loginPasswordError"></div>
      </div>

      <button class="submit-btn" onclick="handleLogin(event)">
        <span class="spinner"></span>
        Login
      </button>
    </div>

    <!-- SIGNUP FORM -->
    <div id="signupForm" class="hidden">
      <div class="error" id="signupGeneralError"></div>
      <div class="role-group">
        <div class="role-option">
          <input type="radio" id="signupStudent" name="signupRole" value="student" checked onchange="updateSignupFields()">
          <label for="signupStudent">Student</label>
        </div>
        <div class="role-option">
          <input type="radio" id="signupFaculty" name="signupRole" value="faculty" onchange="updateSignupFields()">
          <label for="signupFaculty">Faculty</label>
        </div>
      </div>

      <!-- COMMON FIELDS -->
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Your full name">
        <div class="error" id="signupNameError"></div>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signupEmail" placeholder="your@email.com">
        <div class="error" id="signupEmailError"></div>
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" id="signupPhone" placeholder="10-digit mobile number" maxlength="10">
        <div class="error" id="signupPhoneError"></div>
      </div>

      <div class="form-group">
        <label>College/University</label>
        <input type="text" id="signupCollege" placeholder="College name">
      </div>

      <!-- STUDENT ONLY FIELDS -->
      <div id="studentOnlyFields">
        <div class="form-row">
          <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" id="signupDob">
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="signupDepartment" placeholder="e.g., CSE, ECE">
          </div>
        </div>
        <div class="form-group">
          <label>Year of Passout</label>
          <input type="number" id="signupYearOfPassout" placeholder="e.g., 2025" min="2020" max="2030">
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="password-group">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters">
          <div class="error" id="signupPasswordError"></div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="signupConfirmPassword" placeholder="Confirm password">
          <div class="error" id="signupConfirmPasswordError"></div>
        </div>
      </div>

      <button class="submit-btn" onclick="handleSignup(event)">
        <span class="spinner"></span>
        Create Account
      </button>
    </div>
  </div>
</div>

<script>
const baseURL = window.location.protocol === 'file:' ? 'http://localhost:3000' : '';

// ============ TOGGLE BETWEEN LOGIN & SIGNUP ============
function switchToLogin() {
  document.getElementById('loginForm').classList.remove('hidden');
  document.getElementById('signupForm').classList.add('hidden');
  document.querySelectorAll('.toggle-btn')[0].classList.add('active');
  document.querySelectorAll('.toggle-btn')[1].classList.remove('active');
  clearErrors();
}

function switchToSignup() {
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('signupForm').classList.remove('hidden');
  document.querySelectorAll('.toggle-btn')[0].classList.remove('active');
  document.querySelectorAll('.toggle-btn')[1].classList.add('active');
  clearErrors();
}

// ============ SHOW/HIDE STUDENT FIELDS ============
function updateSignupFields() {
  const role = document.querySelector('input[name="signupRole"]:checked').value;
  const studentFields = document.getElementById('studentOnlyFields');
  if (role === 'student') {
    studentFields.classList.remove('hidden');
  } else {
    studentFields.classList.add('hidden');
  }
}

// ============ CLEAR ERRORS ============
function clearErrors() {
  document.querySelectorAll('.error').forEach(el => {
    el.innerHTML = '';
    el.classList.remove('show');
  });
}

function showError(elementId, message) {
  const errorEl = document.getElementById(elementId);
  if (errorEl) {
    errorEl.innerHTML = message;
    errorEl.classList.add('show');
  }
}

// ============ VALIDATE EMAIL ============
function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

// ============ LOGIN HANDLER ============
async function handleLogin(event) {
  clearErrors();
  const role = document.querySelector('input[name="loginRole"]:checked').value;
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    if (!email) showError('loginEmailError', 'Email is required');
    if (!password) showError('loginPasswordError', 'Password is required');
    return;
  }

  // STUDENT LOGIN - Use student form fields
  if (role === 'student') {
    const name = document.getElementById('sname')?.value.trim() || 'Student';
    const phone = document.getElementById('sphone')?.value.trim() || '0000000000';
    const college = document.getElementById('scollege')?.value || 'College';
    
    try {
      const response = await fetch(`${baseURL}/api/student-login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json();
      if (data.success) {
        if (data.token) {
          localStorage.setItem('token', data.token);
        }
        localStorage.setItem('user', JSON.stringify(data.user || { email, role: 'Student' }));
        window.location.href = 'index.html';
        return;
      }
    } catch(e) { console.log('Student login error', e); }
  }
  
  // FACULTY LOGIN
  if (role === 'faculty') {
    const name = document.getElementById('fname')?.value.trim() || 'Faculty';
    const college = document.getElementById('fcollege')?.value || 'College';
    const phone = document.getElementById('fphone')?.value.trim() || '';
    
    try {
      const response = await fetch(`${baseURL}/api/faculty-login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json();
      if (data.success) {
        if (data.token) {
          localStorage.setItem('token', data.token);
        }
        localStorage.setItem('user', JSON.stringify(data.user || { email, role: 'Faculty' }));
        window.location.href = 'index.html';
        return;
      }
    } catch(e) { console.log('Faculty login error', e); }
  }
  
  showError('loginGeneralError', 'Login failed - check console');
}

// ============ SIGNUP HANDLER ============
async function handleSignup(event) {
  clearErrors();
  const role = document.querySelector('input[name="signupRole"]:checked').value;
  const name = document.getElementById('signupName').value.trim();
  const email = document.getElementById('signupEmail').value.trim();
  const phone = document.getElementById('signupPhone').value.trim();
  const college = document.getElementById('signupCollege').value.trim();
  const password = document.getElementById('signupPassword').value;
  const confirmPassword = document.getElementById('signupConfirmPassword').value;
  const btn = event?.currentTarget || event?.target?.closest('button') || document.querySelector('#signupForm .submit-btn');

  // Validation
  let hasError = false;

  if (!name) {
    showError('signupNameError', 'Name is required');
    hasError = true;
  }

  if (!email) {
    showError('signupEmailError', 'Email is required');
    hasError = true;
  } else if (!isValidEmail(email)) {
    showError('signupEmailError', 'Invalid email format');
    hasError = true;
  }

  if (!phone) {
    showError('signupPhoneError', 'Phone is required');
    hasError = true;
  } else if (phone.length !== 10 || isNaN(phone)) {
    showError('signupPhoneError', 'Phone must be 10 digits');
    hasError = true;
  }

  if (!password) {
    showError('signupPasswordError', 'Password is required');
    hasError = true;
  } else if (password.length < 6) {
    showError('signupPasswordError', 'Password must be at least 6 characters');
    hasError = true;
  }

  if (password !== confirmPassword) {
    showError('signupConfirmPasswordError', 'Passwords do not match');
    hasError = true;
  }

  if (hasError) return;

  try {
    btn.classList.add('loading');

    let payload = {
      name,
      email,
      phone,
      college,
      password,
      confirmPassword
    };

    // Add student-specific fields
    if (role === 'student') {
      const dob = document.getElementById('signupDob').value;
      const department = document.getElementById('signupDepartment').value.trim();
      const yearOfPassout = document.getElementById('signupYearOfPassout').value;

      payload = {
        ...payload,
        dob: dob || null,
        department: department || '',
        yearOfPassout: yearOfPassout ? parseInt(yearOfPassout) : null
      };
    }

    const baseURL = window.location.protocol === 'file:' ? 'http://localhost:3000' : `${window.location.protocol}//${window.location.host}`;
    const endpoint = role === 'student' ? `${baseURL}/api/student-signup` : `${baseURL}/api/faculty-signup`;

    const response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await response.json();
    console.log('Signup Response:', data);

    if (!response.ok) {
      showError('signupGeneralError', data.error || response.statusText || 'Signup failed');
      return;
    }

    if (data.success) {
      const successMsg = document.getElementById('successMessage');
      successMsg.innerHTML = '✅ Account created! Please login now.';
      successMsg.classList.add('show');
      
      setTimeout(() => {
        switchToLogin();
        successMsg.classList.remove('show');
      }, 2000);
    } else {
      showError('signupGeneralError', data.error || 'Signup failed');
    }
    } catch (error) {
      console.error('Signup error:', error);
      if (window.location.protocol === 'file:') {
        showError('signupGeneralError', 'Please open this page through http://localhost:7000/login.html and start the Node.js server first.');
      } else {
        showError('signupGeneralError', 'Signup failed. Please try again.');
      }
    } finally {
      btn?.classList.remove('loading');
    }
}

function handleSocialLogin(provider) {
  const providerName = provider === 'google' ? 'Google' : 'GitHub';
  alert(`${providerName} login is not configured yet. This option is coming soon.`);
}

// Prevent form submission on Enter
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
    e.preventDefault();
  }
});
</script>

</body>
</html>
